trigger:
  branches:
    include:
      - main

variables:
  nodeVersion: '20.x'

stages:
  - stage: CI
    displayName: 'CI - Integracao Continua'
    jobs:
      - job: BuildAndTest
        displayName: 'Build e Testes da API EcoTrack'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - checkout: self
            displayName: 'Checkout do codigo-fonte'

          - task: NodeTool@0
            displayName: 'Instalar Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: npm install
            displayName: 'Instalar dependencias'

          - script: npm test
            displayName: 'Executar testes automatizados'

          - script: npm run build
            displayName: 'Executar build da aplicacao'

          - task: ArchiveFiles@2
            displayName: 'Gerar pacote da aplicacao'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/ecotrack-api.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publicar artefato da pipeline'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'
              publishLocation: 'Container'